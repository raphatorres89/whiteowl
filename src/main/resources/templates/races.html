<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Whiteowl - Raças', ~{::section})}">

<section>
    <div class="max-w-7xl mx-auto px-4 py-10">

        <div th:replace="~{layout/breadcrumbs :: breadcrumb(${breadcrumbs})}"></div>

        <div class="mb-8">
            <div class="flex items-center gap-4 mb-2">
                <img th:src="@{/images/icons/races.png}"
                     alt="Ícone de raças"
                     class="w-10 h-10 md:w-20 md:h-20 object-contain">

                <h1 class="text-3xl md:text-5xl text-gold">
                    Raças
                </h1>
            </div>

            <p class="text-gray-400">
                Explore as origens, traços e habilidades raciais.
            </p>
        </div>

        <div th:if="${#lists.isEmpty(races)}"
             class="bg-card border border-gray-800 rounded-2xl p-8 text-center text-gray-400">
            Nenhuma raça encontrada.
        </div>

        <div th:unless="${#lists.isEmpty(races)}"
             class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

            <a th:each="race : ${races}"
               th:href="@{'/races/' + ${race.slug}}"
               class="block bg-card border border-gray-800 rounded-2xl p-5 hover-glow arcane-glow transition">

                <div class="flex items-start gap-4 mb-4">
                    <div class="w-20 h-20 rounded-xl border border-gray-800 bg-black/20 p-2 shrink-0">
                        <img th:src="@{${race.iconPath}}"
                             th:alt="${race.name}"
                             class="w-full h-full object-contain">
                    </div>

                    <div>
                        <h2 class="text-xl text-gold" th:text="${race.name}">Dragonborn</h2>
                        <p class="text-sm text-gray-500" th:text="${race.sizeRaw}">Medium</p>
                    </div>
                </div>

                <p class="text-sm text-gray-400 line-clamp-3"
                   th:text="${race.summary}">
                    Summary...
                </p>
            </a>
        </div>
    </div>
</section>
</html>
