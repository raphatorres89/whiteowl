<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Whiteowl - Classes', ~{::section})}">

<section>
    <div class="max-w-7xl mx-auto px-4 py-10">

        <div th:replace="~{layout/breadcrumbs :: breadcrumb(${breadcrumbs})}"></div>

        <div class="mb-8">
            <div class="flex items-center gap-3 mb-2">
                <img th:src="@{/images/icons/classes.png}"
                     alt="Ícone do bestiário"
                     class="w-10 h-10 md:w-20 md:h-20 object-contain">

                <h1 class="text-3xl md:text-5xl text-gold">
                    Classes
                </h1>
            </div>

            <p class="text-gray-400">
                Explore as classes base e seus caminhos de evolução.
            </p>
        </div>

        <div th:if="${#lists.isEmpty(classes)}"
             class="bg-card border border-gray-800 rounded-2xl p-8 text-center text-gray-400">
            Nenhuma classe encontrada.
        </div>

        <div th:unless="${#lists.isEmpty(classes)}"
             class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

            <a th:each="characterClass : ${classes}"
               th:href="@{'/classes/' + ${characterClass.slug}}"
               class="block bg-card border border-gray-800 rounded-2xl p-5 hover-glow arcane-glow transition rune-hover">

                <div class="flex items-start justify-between gap-3 mb-3">
                    <div class="flex items-center gap-3 min-w-0">
                        <img th:src="@{/images/classes/{slug}.png(slug=${characterClass.slug})}"
                             th:alt="${'Ícone da classe ' + characterClass.name}"
                             class="w-20 h-20 object-contain shrink-0">

                        <h2 class="text-xl text-gold truncate" th:text="${characterClass.name}">
                            Bárbaro
                        </h2>
                    </div>

                    <span class="px-2 py-1 text-xs rounded-full border border-gold text-gold shrink-0"
                          th:text="${characterClass.hitDice}">
                        1d12
                    </span>
                </div>

                <p class="text-sm text-gray-400 mb-4 line-clamp-3"
                   th:text="${characterClass.desc}">
                    Descrição da classe...
                </p>

                <div class="space-y-2 text-sm text-gray-300 mb-4">
                    <p>
                        <span class="text-gray-500">Salvamentos:</span>
                        <span th:text="${characterClass.profSavingThrows}">Força, Constituição</span>
                    </p>

                    <p th:if="${characterClass.spellcastingAbility != null and !#strings.isEmpty(characterClass.spellcastingAbility)}">
                        <span class="text-gray-500">Magia:</span>
                        <span th:text="${characterClass.spellcastingAbility}">Sabedoria</span>
                    </p>

                    <p th:if="${characterClass.subtypesName != null and !#strings.isEmpty(characterClass.subtypesName)}">
                        <span class="text-gray-500">Subtipos:</span>
                        <span th:text="${characterClass.subtypesName}">Caminhos Primais</span>
                    </p>
                </div>

                <div class="text-sm text-gold">
                    Ver detalhes →
                </div>
            </a>
        </div>
    </div>
</section>
</html>
