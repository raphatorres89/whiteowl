<header th:fragment="navbar" class="border-b border-gray-800 relative">

    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

        <!-- Logo -->
        <h1 class="text-lg text-gold tracking-widest">
            Whiteowl
        </h1>

        <!-- Botão -->
        <button onclick="toggleMenu()" class="md:hidden text-2xl text-gold">
            ☰
        </button>

        <!-- Desktop -->
        <nav class="hidden md:flex space-x-6 text-sm">
            <a href="/" class="hover:text-gold">Home</a>
            <a href="/monsters" class="hover:text-gold">Monstros</a>
            <a href="/spells" class="hover:text-gold">Magias</a>
            <a href="/classes" class="hover:text-gold">Classes</a>
        </nav>
    </div>

    <!-- 🌑 OVERLAY -->
    <div id="overlay"
         onclick="toggleMenu()"
         class="fixed inset-0 bg-black/70 backdrop-blur-sm opacity-0 pointer-events-none transition duration-300 z-40">
    </div>

    <!-- 🔮 MENU ARCANO -->
    <div id="mobileMenu"
         class="fixed top-0 right-0 h-full w-64 bg-[#111]
                border-l border-gold
                transform translate-x-full
                transition duration-300 ease-in-out
                z-50
                shadow-[0_0_25px_rgba(201,169,110,0.3)]">

        <!-- Header do menu -->
        <div class="p-4 border-b border-gray-800 text-gold text-lg">
            Grimório
        </div>

        <!-- Links -->
        <nav class="flex flex-col p-4 space-y-4 text-gray-300">
            <a href="/" class="rune-hover px-2 py-1">Home</a>
            <a href="/monsters" class="rune-hover px-2 py-1">Monstros</a>
            <a href="/spells" class="rune-hover px-2 py-1">Magias</a>
            <a href="/classes" class="rune-hover px-2 py-1">Classes</a>
        </nav>

    </div>

</header>
